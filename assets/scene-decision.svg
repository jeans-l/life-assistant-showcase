      <feColorMatrix type="matrix" values="0 0 0 0 0.0784314 0 0 0 0 0.0745098 0 0 0 0 0.0745098 0 0 0 0.15 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="effect1_dropShadow_4_2"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow_4_2" result="shape"/>
    </filter>
  </defs>

  <rect width="960" height="1240" rx="40" fill="url(#bg)"/>
  <circle cx="188" cy="202" r="124" fill="#8EAA8A" fill-opacity="0.14"/>
