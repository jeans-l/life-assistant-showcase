<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生活助理 · 清理预览缓存</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --surface: rgba(255, 252, 247, 0.92);
        --ink: #181717;
        --muted: #6c675f;
        --accent: #2f6df6;
        --border: rgba(24, 23, 23, 0.08);
        --shadow: 0 30px 80px rgba(24, 23, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(47, 109, 246, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(213, 176, 97, 0.2), transparent 28%),
          linear-gradient(180deg, #f8f4ed 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(47, 109, 246, 0.08);
        color: #244fb2;
        font-size: 14px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .actions a.primary {
        background: var(--ink);
        color: #fffdf8;
      }

      .actions a.secondary {
        border: 1px solid var(--border);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在清理当前预览缓存。</h1>
      <p>
        会清掉当前 origin 下的预览状态、本地存储、Cache Storage 和 service worker，然后再跳到你选择的页面。
      </p>
      <div class="status" id="status">准备开始…</div>
      <div class="actions">
        <a class="secondary" href="./preview-index.html">返回导航</a>
        <a class="primary" id="fallback-link" href="./preview-index.html">如果没有自动跳转，点这里继续</a>
      </div>
    </main>
    <script>
      const STORAGE_PREFIXES = ["life-assistant:", "life-assistant.preview."];
      const statusNode = document.getElementById("status");
      const fallbackLink = document.getElementById("fallback-link");

      function setStatus(message) {
        if (statusNode) {
          statusNode.textContent = message;
        }
      }

      function shouldClearKey(key) {
        return STORAGE_PREFIXES.some((prefix) => key.startsWith(prefix));
      }

      function clearStorageBucket(bucket) {
        if (!bucket) {
          return;
        }

        const keys = [];
        for (let index = 0; index < bucket.length; index += 1) {
          const key = bucket.key(index);
          if (key && shouldClearKey(key)) {
            keys.push(key);
          }
        }

        keys.forEach((key) => bucket.removeItem(key));
      }

      async function clearCacheStorage() {
        if (!("caches" in window)) {
          return;
        }

        const cacheKeys = await window.caches.keys();
        await Promise.all(cacheKeys.map((key) => window.caches.delete(key)));
      }

      async function unregisterServiceWorkers() {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      function resolveTargetUrl() {
        const params = new URLSearchParams(window.location.search);
        const rawTarget = params.get("target") || "./preview-index.html";
        const fallback = new URL("./preview-index.html", window.location.href);

        try {
          const target = new URL(rawTarget, window.location.href);
          if (target.origin !== window.location.origin) {
            return fallback;
          }

          target.searchParams.set("cacheBust", String(Date.now()));
          return target;
        } catch {
          return fallback;
        }
      }

      async function resetAndContinue() {
        const targetUrl = resolveTargetUrl();

        if (fallbackLink instanceof HTMLAnchorElement) {
          fallbackLink.href = targetUrl.toString();
        }

        setStatus("正在清理 localStorage / sessionStorage…");
        clearStorageBucket(window.localStorage);
        clearStorageBucket(window.sessionStorage);

        setStatus("正在注销 service worker…");
        await unregisterServiceWorkers();

        setStatus("正在清理 Cache Storage…");
        await clearCacheStorage();

        setStatus("缓存已清理，正在跳转…");
        window.setTimeout(() => {
          window.location.replace(targetUrl.toString());
        }, 120);
      }

      resetAndContinue().catch((error) => {
        console.warn("[preview-reset] failed to clear cache:", error);
        setStatus("自动清理失败了，可以点下面按钮继续打开目标页面。");
      });
    </script>
  </body>
</html>
